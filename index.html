<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Generator & Scanner Barcode</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Playground</h1>

        <!-- Navigasi Tab -->
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('generate')">Create Barcode</button>
            <button class="tab-btn" onclick="openTab('scan')">Scan Barcode</button>
        </div>

        <!-- GENERATE  -->
        <div id="tab-generate" class="tab-content active">
            <div class="card">
                <label for="qr-text">Fill Teks / URL:</label>
                <input type="text" id="qr-text" placeholder="https://github.com/ngedream" value="Hello World!">
                <button id="generate-btn" class="btn-primary">Generate Barcode Now!</button>
                
                <div id="qr-result">
                    <div id="qrcode-container"></div>
                </div>
                
                <button id="download-btn" class="btn-secondary" style="display: none;">Download PNG</button>
                <p id="history-info">History: <span id="history-count">500</span> Barcode</p>
            </div>
        </div>

        <!-- SCAN -->
        <div id="tab-scan" class="tab-content">
            <div class="card">
                <p style="font-size:14px; color:#4a5568;"></p>
                <button id="scan-btn" class="btn-primary"> Turn on your camera</button>
                <button id="stop-scan-btn" class="btn-secondary" style="display: none;">Stop scan</button>
                
                <div id="scanner-container">
                    <div id="reader" style="width:100%; max-width:400px; margin: 10px auto;"></div>
                </div>
                
                <div id="scan-result">
                    <h3 style="font-size:16px; margin-top:16px;">Scanner:</h3>
                    <p id="decoded-text" class="result-box">History scanning...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Library Barcode Code (Generate) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- Library Barcode Code (Scanner) -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <!-- File js -->
    <script src="script.js"></script>
</body>
</html>
